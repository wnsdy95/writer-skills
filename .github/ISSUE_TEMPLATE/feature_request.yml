name: Feature request
description: Suggest a new skill, template, reference, or workflow improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: need
    attributes:
      label: Need
      description: What writing or editing workflow should this improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the concrete skill, template, reference, or output change.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
  - type: textarea
    id: risk
    attributes:
      label: Risk notes
      description: Include any high-stakes, copyright, privacy, or evidence concerns.
    validations:
      required: false
